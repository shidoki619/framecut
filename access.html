<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Доступ — FrameCut</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="auth-page">
  <div class="noise"></div>
  <div class="gradient-orb orb-1"></div>
  <div class="gradient-orb orb-2"></div>

  <div class="auth-wrap">
    <a href="index.html" class="logo auth-logo">
      <span class="logo-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
          <rect x="3" y="5" width="18" height="14" rx="2" stroke="currentColor" stroke-width="1.5"/>
          <path d="M10 9.5v5l4.5-2.5L10 9.5z" fill="currentColor"/>
        </svg>
      </span>
      FrameCut
    </a>

    <div class="auth-card">
      <h1>Доступ к сайту</h1>
      <p class="auth-subtitle">Введите пароль один раз — дальше вход сохранится на этом устройстве</p>

      <form class="auth-form" id="accessForm">
        <label class="form-field">
          <span>Пароль доступа</span>
          <input type="password" name="password" placeholder="••••••••" required autocomplete="off">
        </label>
        <p class="form-error" id="formError"></p>
        <button type="submit" class="btn btn-primary btn-block">Войти на сайт</button>
      </form>
    </div>
  </div>

  <script src="cursor-bg.js"></script>
  <script src="auth.js"></script>
  <script>
    const params = new URLSearchParams(location.search);
    const next = params.get('next') || 'index.html';

    if (Auth.hasSiteAccess()) {
      location.replace(next);
    }

    document.getElementById('accessForm').addEventListener('submit', async e => {
      e.preventDefault();
      const errorEl = document.getElementById('formError');
      errorEl.textContent = '';

      const form = e.target;
      const btn = form.querySelector('button[type="submit"]');
      btn.disabled = true;
      btn.textContent = 'Проверка...';

      try {
        await Auth.verifySiteAccess(form.password.value);
        location.replace(next);
      } catch (err) {
        errorEl.textContent = err.message;
        btn.disabled = false;
        btn.textContent = 'Войти на сайт';
      }
    });
  </script>
</body>
</html>
