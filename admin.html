<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Админ-панель — FrameCut</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="noise"></div>
  <div class="gradient-orb orb-1"></div>
  <div class="gradient-orb orb-2"></div>

  <header class="header scrolled">
    <nav class="nav container">
      <a href="index.html" class="logo">
        <span class="logo-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
            <rect x="3" y="5" width="18" height="14" rx="2" stroke="currentColor" stroke-width="1.5"/>
            <path d="M10 9.5v5l4.5-2.5L10 9.5z" fill="currentColor"/>
          </svg>
        </span>
        FrameCut
      </a>
      <ul class="nav-links">
        <li><a href="index.html">Сайт</a></li>
        <li><a href="dashboard.html">Кабинет</a></li>
      </ul>
      <div class="nav-auth" id="navAuth"></div>
    </nav>
  </header>

  <main class="admin-page container">
    <div class="admin-header">
      <div>
        <span class="section-tag">Admin</span>
        <h1>Заявки клиентов</h1>
      </div>
      <button type="button" class="btn btn-ghost btn-sm" id="refreshBtn">Обновить</button>
    </div>

    <div class="admin-stats" id="adminStats">
      <div class="dash-stat"><span class="dash-stat-value" id="statAll">0</span><span class="dash-stat-label">всего</span></div>
      <div class="dash-stat"><span class="dash-stat-value" id="statPending">0</span><span class="dash-stat-label">ожидают</span></div>
      <div class="dash-stat"><span class="dash-stat-value" id="statProgress">0</span><span class="dash-stat-label">в работе</span></div>
      <div class="dash-stat"><span class="dash-stat-value" id="statDone">0</span><span class="dash-stat-label">закрыто</span></div>
    </div>

    <div class="admin-filters">
      <button type="button" class="filter-btn active" data-filter="all">Все</button>
      <button type="button" class="filter-btn" data-filter="pending">Ожидают</button>
      <button type="button" class="filter-btn" data-filter="in_progress">В работе</button>
      <button type="button" class="filter-btn" data-filter="done">Закрытые</button>
    </div>

    <div class="orders-layout admin-orders-layout" id="adminOrdersLayout">
      <aside class="orders-sidebar" id="adminOrdersSidebar">
        <p class="admin-loading">Загрузка...</p>
      </aside>
      <div class="orders-detail" id="adminOrdersDetail">
        <div class="orders-detail-empty"><p>Выберите обращение слева</p></div>
      </div>
    </div>
  </main>

  <script src="cursor-bg.js"></script>
  <script src="auth.js"></script>
  <script src="auth-ui.js"></script>
  <script src="admin.js"></script>
</body>
</html>
